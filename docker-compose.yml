services:
  # 1. Cơ sở dữ liệu PostgreSQL
  postgres_db:
    image: postgres:15-alpine
    container_name: booking_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - booking_network

  # 2. Redis Cache để lưu OTP
  redis_cache:
    image: redis:7-alpine
    container_name: booking_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - booking_network

  # 3. RabbitMQ Message Broker (Hàng đợi)
  rabbitmq_queue:
    image: rabbitmq:3-management-alpine
    container_name: booking_rabbitmq
    restart: always
    ports:
      - "5672:5672"   # Cổng giao tiếp AMQP
      - "15672:15672" # Cổng giao diện UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - booking_network

  # 4. Backend API Service (Chạy môi trường Dev)
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: booking_api
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - ./api/.env.dev
    environment:
      - DATABASE_URL=postgresql://postgres:123456@postgres_db:5432/booking?schema=public
      - REDIS_HOST=redis_cache
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq_queue:5672
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
      rabbitmq_queue:
        condition: service_healthy
    networks:
      - booking_network

  # 5. Frontend Client Service (Đang bị comment)
  # client:
  #   build:
  #     context: ./client
  #     dockerfile: Dockerfile
  #   container_name: booking_client
  #   restart: always
  #   ports:
  #     - "${CLIENT_PORT:-3001}:3000"   
  #   env_file:
  #     - ./client/.env.dev
  #   volumes:
  #     - ./client:/app
  #     - /app/node_modules
  #   depends_on:
  #     - api
  #   networks:
  #     - booking_network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  booking_network:
    driver: bridge